services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study-bot
    restart: unless-stopped

    volumes:
      - bot-data:/data

    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      CREATE_ROOM_CHANNEL_ID: ${CREATE_ROOM_CHANNEL_ID:-}
      TEMP_ROOM_CATEGORY_ID: ${TEMP_ROOM_CATEGORY_ID:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      AI_PROVIDER_ORDER: ${AI_PROVIDER_ORDER:-groq,gemini,openrouter,huggingface}
      GROQ_MODELS: ${GROQ_MODELS:-llama-3.3-70b-versatile,llama-3.1-8b-instant}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-meta-llama/llama-3.3-70b-instruct:free}
      OPENROUTER_HTTP_REFERER: ${OPENROUTER_HTTP_REFERER:-https://localhost}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-https://localhost}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-Study Discord Bot}
      HUGGINGFACE_API_KEY: ${HUGGINGFACE_API_KEY:-}
      HUGGING_FACE_API_KEY: ${HUGGING_FACE_API_KEY:-}
      HF_TOKEN: ${HF_TOKEN:-}
      HUGGINGFACE_MODEL: ${HUGGINGFACE_MODEL:-mistralai/Mistral-7B-Instruct-v0.3}
      GEMINI_FLASH_MODEL: ${GEMINI_FLASH_MODEL:-gemini-3.5-flash}
      GEMINI_FLASH_LITE_MODEL: ${GEMINI_FLASH_LITE_MODEL:-gemini-3.1-flash-lite}
      AI_HTTP_TIMEOUT: ${AI_HTTP_TIMEOUT:-60}
      AI_ONE_MESSAGE_LIMIT: ${AI_ONE_MESSAGE_LIMIT:-1900}
      AI_MAX_OUTPUT_TOKENS: ${AI_MAX_OUTPUT_TOKENS:-1800}
      AI_TEMPERATURE: ${AI_TEMPERATURE:-0.5}
      AI_SYSTEM_PROMPT: ${AI_SYSTEM_PROMPT:-}
      SHORT_TERM_MEMORY_LIMIT: ${SHORT_TERM_MEMORY_LIMIT:-30}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      DATA_DIR: /data
      DASHBOARD_PORT: ${DASHBOARD_PORT:-5000}
      COINS_PER_MINUTE: ${COINS_PER_MINUTE:-10}
      BOT_LOAN_INTEREST_PERCENT: ${BOT_LOAN_INTEREST_PERCENT:-10}
      BOT_LOAN_DAYS: ${BOT_LOAN_DAYS:-7}
      MAX_BOT_LOAN_AMOUNT: ${MAX_BOT_LOAN_AMOUNT:-5000}
      MAX_ACTIVE_LOANS: ${MAX_ACTIVE_LOANS:-3}
      MAX_PENDING_LOAN_OFFERS: ${MAX_PENDING_LOAN_OFFERS:-10}
      TRANSACTION_HISTORY_LIMIT: ${TRANSACTION_HISTORY_LIMIT:-100}
      LOAN_HISTORY_LIMIT: ${LOAN_HISTORY_LIMIT:-50}
      RUNTIME_RESTORE_MAX_AGE_SECONDS: ${RUNTIME_RESTORE_MAX_AGE_SECONDS:-1800}

    ports:
      - "${DASHBOARD_PORT:-5000}:5000"

    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; exit(0 if os.path.isdir(\"/data\") and os.access(\"/data\", os.W_OK) else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
    driver: local

networks:
  default:
    name: studybot-network
