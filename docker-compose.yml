services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: study-bot
    restart: unless-stopped

    volumes:
      - bot-data:/data

    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN:?DISCORD_TOKEN is required}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      TZ: ${TZ:-Asia/Ho_Chi_Minh}
      DATA_DIR: /data
      DASHBOARD_PORT: ${DASHBOARD_PORT:-5000}

    ports:
      - "${DASHBOARD_PORT:-5000}:5000"

    healthcheck:
      test: ["CMD-SHELL", "python -c 'import os; exit(0 if os.path.isdir(\"/data\") and os.access(\"/data\", os.W_OK) else 1)'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  bot-data:
    driver: local

networks:
  default:
    name: studybot-network